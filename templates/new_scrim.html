{% extends "base.html" %}

{% block title %}New Scrim{% endblock %}

{% block content %}
<div class="main-header">
    <div>
        <h2>New Scrim</h2>
        <p>Create the scrim first. Then add maps inside it.</p>
    </div>
    <a href="{{ url_for('scrims') }}" class="button-secondary">Back to Scrims</a>
</div>

<form action="{{ url_for('create_scrim') }}" method="post">
    <section class="panel">
        <h3>Scrim Info</h3>

        <div class="form-grid">
            <div class="field">
                <label for="team_id">Your Team</label>
                <select id="team_id" name="team_id" required>
                    <option value="">Select your team</option>
                    {% for team in teams %}
                        <option value="{{ team.id }}">{{ team.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field">
                <label for="enemy_team">Enemy Team</label>
                <select id="enemy_team_select" name="enemy_team_id" style="display: none;">
                    <option value="">Select a saved enemy team</option>
                </select>
                <input type="hidden" id="enemy_team_id_hidden" name="enemy_team_id" value="">
                <input type="text" id="enemy_team" name="enemy_team_manual" placeholder="Or type opponent name">
                <small style="display: block; margin-top: 6px; color: var(--muted);">Select from saved teams or type a custom team name</small>
            </div>

            <div class="field">
                <label for="scrim_date">Date</label>
                <input type="date" id="scrim_date" name="scrim_date" value="{{ today }}" required>
            </div>
        </div>
    </section>

    <section class="panel">
        <h3>Notes</h3>
        <div class="field">
            <label for="notes">General Scrim Notes</label>
            <textarea id="notes" name="notes" rows="6" placeholder="Overall scrim notes, macro notes, opponent tendencies..."></textarea>
        </div>
    </section>

    <div class="button-row">
        <button type="submit">Create Scrim</button>
    </div>
</form>

<script>
// Handle team selection and enemy team loading
const teamSelect = document.getElementById('team_id');
const enemyTeamSelect = document.getElementById('enemy_team_select');
const enemyTeamIdHidden = document.getElementById('enemy_team_id_hidden');
const enemyTeamManual = document.getElementById('enemy_team');
const form = document.querySelector('form');

async function loadEnemyTeams() {
    const teamId = teamSelect.value;
    if (!teamId) {
        enemyTeamSelect.style.display = 'none';
        enemyTeamManual.style.display = 'block';
        enemyTeamManual.required = true;
        return;
    }

    try {
        const response = await fetch(`/api/teams/${teamId}/enemies`);
        const enemies = await response.json();
        
        if (enemies.length > 0) {
            enemyTeamSelect.innerHTML = '<option value="">Select a saved enemy team</option>';
            enemies.forEach(enemy => {
                const option = document.createElement('option');
                option.value = enemy.id;
                option.textContent = enemy.name;
                option.dataset.enemyId = enemy.id;
                option.dataset.enemyName = enemy.name;
                enemyTeamSelect.appendChild(option);
            });
            enemyTeamSelect.style.display = 'block';
            enemyTeamManual.style.display = 'none';
            enemyTeamManual.required = false;
        } else {
            enemyTeamSelect.style.display = 'none';
            enemyTeamManual.style.display = 'block';
            enemyTeamManual.required = true;
        }
    } catch (e) {
        console.error('Failed to load enemy teams:', e);
        enemyTeamSelect.style.display = 'none';
        enemyTeamManual.style.display = 'block';
        enemyTeamManual.required = true;
    }
}

enemyTeamSelect.addEventListener('change', (e) => {
    if (enemyTeamSelect.value) {
        const selectedOption = enemyTeamSelect.options[enemyTeamSelect.selectedIndex];
        enemyTeamIdHidden.value = selectedOption.value;
        enemyTeamManual.value = selectedOption.dataset.enemyName;
    } else {
        enemyTeamIdHidden.value = '';
        enemyTeamManual.value = '';
    }
});

teamSelect.addEventListener('change', loadEnemyTeams);

// Form submission handler
form.addEventListener('submit', function(e) {
    let enemyTeamValue = '';
    let enemyTeamIdValue = '';
    
    if (enemyTeamSelect.style.display !== 'none' && enemyTeamSelect.value) {
        enemyTeamIdValue = enemyTeamSelect.value;
        const selectedOption = enemyTeamSelect.options[enemyTeamSelect.selectedIndex];
        enemyTeamValue = selectedOption.dataset.enemyName;
    } else {
        enemyTeamValue = enemyTeamManual.value;
        enemyTeamIdValue = '';
    }

    if (!enemyTeamValue.trim()) {
        e.preventDefault();
        alert('Please select or enter an enemy team name.');
        return;
    }

    // Set the values
    enemyTeamManual.value = enemyTeamValue;
    enemyTeamIdHidden.value = enemyTeamIdValue;
});
</script>
{% endblock %}
