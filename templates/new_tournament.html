{% extends "base.html" %}

{% block title %}New Tournament{% endblock %}

{% block content %}
<div class="main-header">
    <div>
        <h2>New Tournament Match</h2>
        <p>Create an enemy-vs-enemy match under one of your teams for scouting.</p>
    </div>
    <a href="{{ url_for('tournaments') }}" class="button-secondary">Back to Tournaments</a>
</div>

<form action="{{ url_for('create_tournament') }}" method="post">
    <section class="panel">
        <h3>Match Info</h3>

        <div class="form-grid">
            <div class="field">
                <label for="team_id">Owner Team</label>
                <select id="team_id" name="team_id" required>
                    <option value="">Select your team</option>
                    {% for team in teams %}
                        <option value="{{ team.id }}">{{ team.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="field">
                <label for="team1_enemy_id">Tournament Team 1</label>
                <select id="team1_enemy_id" name="team1_enemy_id" required disabled>
                    <option value="">Select owner team first</option>
                </select>
            </div>

            <div class="field">
                <label for="team2_enemy_id">Tournament Team 2</label>
                <select id="team2_enemy_id" name="team2_enemy_id" required disabled>
                    <option value="">Select owner team first</option>
                </select>
            </div>

            <div class="field">
                <label for="scrim_date">Date</label>
                <input type="date" id="scrim_date" name="scrim_date" value="{{ today }}" required>
            </div>

            <div class="field">
                <label for="season">Season</label>
                <input type="text" id="season" name="season" placeholder="e.g. 7 or 7.5" required>
            </div>
        </div>
    </section>

    <section class="panel">
        <h3>Notes</h3>
        <div class="field">
            <label for="notes">Scouting Notes</label>
            <textarea id="notes" name="notes" rows="6" placeholder="What you want to compare, meta context, broadcast/VOD references..."></textarea>
        </div>
    </section>

    <div class="button-row">
        <button type="submit">Create Tournament Match</button>
    </div>
</form>

<script>
(() => {
    const teamSelect = document.getElementById('team_id');
    const team1Select = document.getElementById('team1_enemy_id');
    const team2Select = document.getElementById('team2_enemy_id');

    function resetSelect(select, placeholder) {
        select.innerHTML = '<option value="">' + placeholder + '</option>';
        select.disabled = true;
    }

    function fillSelect(select, enemies, selectedValue) {
        select.innerHTML = '<option value="">Select a team</option>';
        enemies.forEach((enemy) => {
            const option = document.createElement('option');
            option.value = enemy.id;
            option.textContent = enemy.name;
            if (String(enemy.id) === String(selectedValue || '')) {
                option.selected = true;
            }
            select.appendChild(option);
        });
        select.disabled = false;
    }

    function syncOptions() {
        const team1Value = team1Select.value;
        const team2Value = team2Select.value;
        Array.from(team1Select.options).forEach((option) => {
            option.hidden = option.value !== '' && option.value === team2Value;
        });
        Array.from(team2Select.options).forEach((option) => {
            option.hidden = option.value !== '' && option.value === team1Value;
        });
    }

    async function loadEnemyTeams() {
        const teamId = teamSelect.value;
        if (!teamId) {
            resetSelect(team1Select, 'Select owner team first');
            resetSelect(team2Select, 'Select owner team first');
            return;
        }

        try {
            const response = await fetch('/api/teams/' + encodeURIComponent(teamId) + '/enemies');
            const enemies = await response.json();
            fillSelect(team1Select, enemies);
            fillSelect(team2Select, enemies);
            syncOptions();
        } catch (error) {
            console.error('Failed to load enemy teams', error);
            resetSelect(team1Select, 'Failed to load teams');
            resetSelect(team2Select, 'Failed to load teams');
        }
    }

    teamSelect.addEventListener('change', loadEnemyTeams);
    team1Select.addEventListener('change', syncOptions);
    team2Select.addEventListener('change', syncOptions);
})();
</script>
{% endblock %}
